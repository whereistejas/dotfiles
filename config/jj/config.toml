[user]
name = "Tejas Sanap"
email = "tejas.sanap@beacon.io"

[signing]
behavior = "own"
backend = "ssh"
key = "~/.ssh/beacon2.pub"
backends.ssh.allowed-signers = "~/.ssh/allowed_signers"

[aliases]
e = ["edit"]
mv = ["b", "move", "--allow-backwards"]
ds = ["describe"]
nx = ["edit", "@+"]
pv = ["edit", "@-"]
gp = ["git", "push", "--remote", "origin"]
gs = ["git", "push", "--remote", "sourcehut"]
gf = ["git", "fetch", "--branch", "main", "--branch", "master"]
sq = ["squash"]
l = ["log", "-r", "bookmarks()"]
la = ["log", "-r", "trunk()::@"]
df = ["diff", "--name-only"]
sd = ["diff", "--tool", "difft"]
ndiff = ["diffedit", "--tool", "nvimdiff"]
clone = ["git", "clone"]

[merge-tools.nvimdiff]
program = "nvim"
# Native nvim -d diff editing: jj calls this once per changed file
# (file-by-file), so $left/$output are individual files, not directories.
# Left = parent (reference), right = $output (edit this; jj snapshots it back).
edit-args = ["-d", "$left", "$output", "-c", "wincmd l", "-c", "setlocal noro modifiable"]
edit-invocation-mode = "file-by-file"
# Read-only viewing via `jj diff --tool nvimdiff`: left = parent, right = child.
# Also file-by-file so $left/$right are individual files (not dirs).
diff-args = ["-d", "$left", "$right"]
diff-invocation-mode = "file-by-file"
merge-args = ["-f", "-d", "$output", "-M", "$left", "$base", "$right",
              "-c", "wincmd J", "-c", "set modifiable", "-c", "set write",
              "-c", "/<<<<<</+2"]
merge-tool-edits-conflict-markers = true

[merge-tools.jj-hunk]
program = "jj-hunk"
edit-args = ["select", "$left", "$right"]

[ui]
paginate = "auto"
pager = ["delta", "--pager", "less -FRX"]
diff-formatter = ":git"
diff-editor = "nvimdiff"
merge-editor = "mergiraf"
diff-instructions = false
show-cryptographic-signatures = true
default-command = "status"

[remotes.origin]
auto-track-bookmarks = 'exact:"main" | exact:"master"'

[template-aliases]
'blame_with_msg' = '''
commit.commit_id().short(8)
++ " "
++ pad_end(20, commit.author().name())
++ " "
++ commit.author().timestamp().format("%Y-%m-%d")
++ " "
++ pad_start(4, line_number)
++ " ["
++ truncate_end(35, commit.description().first_line())
++ "] "
++ content
'''

