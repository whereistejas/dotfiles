theme = "custom"

# Gruvbox Light, mapped onto hunk's paper base theme.
[custom_theme]
base = "paper"
label = "Gruvbox Light"
background = "#fbf1c7"
panel = "#fbf1c7"
panelAlt = "#f2e5bc"
border = "#d5c4a1"
accent = "#076678"
accentMuted = "#bdae93"
text = "#3c3836"
muted = "#7c6f64"
addedBg = "#e2da9b"
removedBg = "#efbd9c"
movedAddedBg = "#d6dbba"
movedRemovedBg = "#ecd4ba"
contextBg = "#fbf1c7"
addedContentBg = "#efe6b2"
removedContentBg = "#f5d8b2"
contextContentBg = "#fbf1c7"
addedSignColor = "#79740e"
removedSignColor = "#9d0006"
lineNumberBg = "#fbf1c7"
lineNumberFg = "#a89984"
selectedHunk = "#d5c4a1"
badgeAdded = "#79740e"
badgeRemoved = "#9d0006"
badgeNeutral = "#b57614"
fileNew = "#79740e"
fileDeleted = "#9d0006"
fileRenamed = "#b57614"
fileModified = "#8f3f71"
fileUntracked = "#076678"
noteBorder = "#8f3f71"
noteBackground = "#f3e2c0"
noteTitleBackground = "#edd7bb"
noteTitleText = "#8f3f71"

[custom_theme.syntax]
default = "#3c3836"
keyword = "#9d0006"
string = "#79740e"
comment = "#928374"
number = "#8f3f71"
function = "#427b58"
property = "#076678"
type = "#b57614"
punctuation = "#665c54"
